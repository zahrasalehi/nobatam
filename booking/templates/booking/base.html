<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}وقت بگیر{% endblock %}</title>
    <style>
        body { font-family: Tahoma, Arial, sans-serif; margin: 1rem; max-width: 48rem; margin-left: auto; margin-right: auto; }
        a { color: #0066cc; }
        .btn { display: inline-block; padding: 0.5rem 1rem; background: #0066cc; color: white; text-decoration: none; border-radius: 4px; border: none; cursor: pointer; }
        .btn:hover { background: #0052a3; }
        form { margin: 1rem 0; }
        input[type="text"] { padding: 0.5rem; width: 20rem; }
        ul { list-style: none; padding: 0; }
        li { padding: 0.75rem; border-bottom: 1px solid #eee; }
        .error { color: #c00; }
    </style>
</head>
<body>
    <nav>
        {% if request.session.paziresh24_access_token %}
            <a href="{% url 'booking:dashboard' %}">داشبورد</a> |
            <a href="{% url 'booking:search' %}">جستجوی پزشک</a> |
            <a href="{% url 'booking:logout' %}">خروج</a>
        {% else %}
            <a href="{% url 'booking:home' %}">خانه</a>
        {% endif %}
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
